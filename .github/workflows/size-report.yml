name: Size Report

on:
  workflow_run:
    workflows: ["Size"]
    types:
      - completed

permissions:
  pull-requests: write

jobs:

  size-report:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
      with:
        egress-policy: audit

    - name: Download report
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
      with:
        name: report_pr
        path: /tmp/ot-size-report
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}

    - name: Post Report
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      id: post-report
      with:
        script: |
          const fs = require('fs')

          const report = fs.readFileSync('/tmp/ot-size-report/report_pr', 'utf8');

          const prNumbers = context.payload.workflow_run.pull_requests.map(pr => pr.number);
          if (prNumbers.length === 0) return;

          const params = {
              issue_number: prNumbers[0],
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report,
          }

          const response = await github.rest.issues.listComments({
            issue_number: prNumbers[0],
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          const kMagicHeader = '<!-- Size Report of **OpenThread** -->'
          const comment = response.data.find(comment => comment.body.startsWith(kMagicHeader))

          if (comment) {
            params.comment_id = comment.id;
            await github.rest.issues.updateComment(params)
          } else {
            await github.rest.issues.createComment(params)
          }
